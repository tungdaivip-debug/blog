<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mô Phỏng Quần Xã Sinh Vật L</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Tối ưu cho Mobile Game */
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #0f172a; 
            color: white; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            overscroll-behavior: none; /* Thay touch-action: none bằng overscroll-behavior để không chặn thanh trượt/cuộn menu */
        }
        
        canvas { 
            display: block; 
            position: absolute;
            top: 0; left: 0;
            z-index: 0;
            touch-action: none; /* Chỉ chặn thao tác cuộn web trên khu vực vẽ game */
        }

        /* Hiệu ứng kính mờ cho UI */
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-solid {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Animation chuyển màn hình */
        .fade-enter { animation: fadeIn 0.3s ease-out forwards; }
        .fade-exit { animation: fadeOut 0.3s ease-in forwards; pointer-events: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes fadeOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(1.05); } }

        /* Animation Bottom Sheet */
        .slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .slide-down { animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes slideDown { from { transform: translateY(0); } to { transform: translateY(100%); } }

        /* Tùy chỉnh thanh trượt */
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
            touch-action: pan-x; /* Cho phép trình duyệt nhận diện thao tác vuốt ngang trên thanh trượt */
            margin: 6px 0; /* Ép gọn khoảng cách thanh trượt */
        }
        input[type=range]:focus {
            outline: none;
        }
        /* Webkit (Chrome, Safari, Edge, Mobile) */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px; width: 20px; /* Thu nhỏ thanh trượt một chút */
            border-radius: 50%;
            background: #2dd4bf;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 8px rgba(0,0,0,0.6);
            border: 2px solid white;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 8px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2); 
            border-radius: 4px;
        }
        /* Firefox */
        input[type=range]::-moz-range-track {
            width: 100%; height: 8px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        input[type=range]::-moz-range-thumb {
            height: 20px; width: 20px;
            border-radius: 50%;
            background: #2dd4bf;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 0 8px rgba(0,0,0,0.6);
        }
        
        /* Hiệu ứng làm mờ canvas khi ở menu */
        .canvas-blur { filter: blur(8px) brightness(0.6); transition: filter 0.5s ease; }
        .canvas-clear { filter: blur(0px) brightness(1); transition: filter 0.5s ease; }
    </style>
</head>
<body>

    <!-- LỚP NỀN CANVAS GAME -->
    <canvas id="worldCanvas" class="canvas-blur"></canvas>

    <!-- MÀN HÌNH CHÍNH (MAIN MENU) -->
    <div id="mainMenu" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-slate-900/40 backdrop-blur-sm">
        <div class="text-center mb-10 fade-enter">
            <h1 class="text-5xl font-black bg-clip-text text-transparent bg-gradient-to-r from-teal-400 to-blue-500 drop-shadow-lg mb-2">Tete universe</h1>
            <p class="text-slate-300 text-sm tracking-widest uppercase">Mô phỏng sinh mệnh nhân tạo</p>
        </div>

        <div class="flex flex-col gap-4 w-64 fade-enter" style="animation-delay: 0.1s;">
            <button onclick="startGame()" class="relative overflow-hidden group bg-gradient-to-r from-teal-500 to-blue-600 text-white font-bold text-xl py-4 rounded-2xl shadow-[0_0_20px_rgba(20,184,166,0.4)] active:scale-95 transition-all">
                <span class="relative z-10">BẮT ĐẦU</span>
                <div class="absolute inset-0 h-full w-full bg-white/20 scale-x-0 group-hover:scale-x-100 origin-left transition-transform duration-300"></div>
            </button>
            
            <button onclick="openSetup()" class="glass text-white font-semibold py-3 rounded-2xl active:scale-95 transition-transform border border-slate-600">
                ⚙️ Thiết lập ban đầu
            </button>
            
            <div class="text-center mt-8 text-xs text-slate-400">
                <p>Kéo để di chuyển • Vuốt để Zoom</p>
                <p>Chạm để thả sinh vật</p>
            </div>
        </div>
    </div>

    <!-- GIAO DIỆN TRONG GAME (HUD) -->
    <div id="gameHUD" class="absolute inset-0 z-40 hidden pointer-events-none flex-col justify-between">
        
        <!-- Top Bar (Thông số) - Thu gọn -->
        <div class="w-full glass rounded-b-2xl p-2 px-4 flex justify-between items-center pointer-events-auto shadow-md fade-enter">
            <button onclick="exitToMenu()" class="w-8 h-8 rounded-full bg-slate-800/80 flex items-center justify-center active:scale-90 transition border border-slate-600">
                <span class="text-sm">🏠</span>
            </button>
            
            <div class="flex flex-col items-center flex-1">
                <div class="flex gap-4">
                    <div class="text-center">
                        <div class="text-[9px] text-teal-400 uppercase font-bold tracking-wider">Sinh vật</div>
                        <div id="popCount" class="text-lg font-black text-white leading-none">0</div>
                    </div>
                    <div class="w-px bg-slate-600"></div>
                    <div class="text-center">
                        <div class="text-[9px] text-purple-400 uppercase font-bold tracking-wider">Quần xã</div>
                        <div id="colonyCount" class="text-lg font-black text-white leading-none">0</div>
                    </div>
                </div>
                <div class="text-[8px] text-gray-400 mt-0.5 bg-slate-800/50 px-2 py-0.5 rounded-full">
                    Gió: <span id="windDisplay" class="text-cyan-300">Tĩnh lặng</span>
                </div>
            </div>

            <button id="btnToggle" onclick="togglePause()" class="w-8 h-8 rounded-full bg-teal-600/80 flex items-center justify-center active:scale-90 transition border border-teal-500 shadow-[0_0_8px_rgba(20,184,166,0.5)]">
                <span class="text-xs">⏸</span>
            </button>
        </div>

        <!-- Bottom Controls (Thanh Dock nổi ngang đáy màn hình) -->
        <div class="absolute bottom-6 w-full flex justify-center pointer-events-none fade-enter">
            <div class="flex items-center gap-2 glass-solid px-3 py-2 rounded-3xl pointer-events-auto shadow-2xl border border-slate-600">
                <!-- Nút Cài đặt -->
                <button onclick="openSettings()" class="w-10 h-10 rounded-xl bg-slate-800/80 flex items-center justify-center active:scale-90 transition text-lg border border-slate-600">🎛️</button>
                
                <!-- Nút Kỷ nguyên -->
                <button id="btnEra" class="w-10 h-10 rounded-xl bg-fuchsia-900/50 flex items-center justify-center active:scale-90 transition text-lg border border-fuchsia-500/50">🌌</button>

                <!-- Nút Hành động trung tâm nổi lên (Nổi bật) -->
                <button onclick="spawnRandomBatch(event)" class="w-14 h-14 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center active:scale-90 transition border-2 border-indigo-400 text-2xl shadow-[0_0_15px_rgba(79,70,229,0.5)] mx-1 -translate-y-2">🧬</button>

                <!-- Nút Bút vẽ -->
                <button onclick="openTools()" class="w-10 h-10 rounded-xl bg-slate-800/80 flex items-center justify-center active:scale-90 transition text-lg border border-slate-600 relative">🖌️
                    <div id="brushIndicator" class="absolute -top-1 -right-1 w-4 h-4 bg-teal-500 rounded-full text-[9px] flex items-center justify-center font-bold border border-slate-800">1</div>
                </button>
                
                <!-- Nút Xoá -->
                <button onclick="clearWorld()" class="w-10 h-10 rounded-xl bg-rose-900/50 flex items-center justify-center active:scale-90 transition text-lg border border-rose-500/50">🗑️</button>
            </div>
        </div>
    </div>

    <!-- BOTTOM SHEETS (Menu trượt từ dưới lên) -->
    <div id="overlay" class="absolute inset-0 bg-black/60 z-50 hidden opacity-0 transition-opacity duration-300" onclick="closeAllPanels()"></div>

    <!-- 1. Bảng Cài Đặt (Settings) - Thu gọn -->
    <div id="settingsPanel" class="absolute bottom-0 left-0 w-full glass-solid rounded-t-3xl p-4 z-50 hidden flex-col gap-3 max-h-[85vh] overflow-y-auto transform translate-y-full pb-6">
        <div class="w-10 h-1 bg-slate-600 rounded-full mx-auto mb-1"></div>
        <div class="relative w-full flex justify-center items-center mb-1">
            <h2 class="text-lg font-bold text-white">Thông Số Sinh Học</h2>
            <button onclick="closeAllPanels()" class="absolute right-0 w-8 h-8 rounded-full bg-slate-800 border border-slate-600 flex items-center justify-center text-xs font-bold text-gray-300 hover:text-white active:scale-90 transition">✕</button>
        </div>
        
        <div class="space-y-3">
            <!-- Tốc độ -->
            <div>
                <div class="flex justify-between text-[11px] text-gray-400">
                    <span>Rùa 🐢</span><span class="font-bold text-teal-400">Tốc độ thời gian</span><span>Thỏ 🐇</span>
                </div>
                <input type="range" id="speedSlider" min="1" max="100" value="72">
            </div>

            <!-- Giới hạn quần xã -->
            <div>
                <div class="flex justify-between text-[11px] text-gray-400">
                    <span class="font-bold text-purple-400">Giới hạn số lượng bầy</span>
                    <span id="limitDisplay" class="text-white font-bold">30</span>
                </div>
                <input type="range" id="limitSlider" min="5" max="200" value="30">
            </div>

            <!-- Phạm vi -->
            <div>
                <div class="flex justify-between text-[11px] text-gray-400">
                    <span class="font-bold text-pink-400">Phạm vi nối bầy (ô)</span>
                    <span id="distanceDisplay" class="text-white font-bold">15</span>
                </div>
                <input type="range" id="distanceSlider" min="2" max="50" value="15">
            </div>

            <!-- Tính bầy đàn -->
            <div>
                <div class="flex justify-between text-[11px] text-gray-400">
                    <span class="font-bold text-blue-400">Tập tính bầy đàn (%)</span>
                    <span id="flockDisplay" class="text-white font-bold">40</span>
                </div>
                <input type="range" id="flockSlider" min="0" max="100" value="40">
            </div>
        </div>

        <div class="flex flex-col gap-2 mt-1">
            <label class="flex items-center justify-between p-2.5 rounded-xl bg-slate-800/50 border border-slate-700 active:bg-slate-700 transition">
                <span class="font-semibold text-xs">Tự động sinh ngẫu nhiên</span>
                <input type="checkbox" id="autoSpawnCheck" checked class="w-4 h-4 accent-teal-500">
            </label>
            <label class="flex items-center justify-between p-2.5 rounded-xl bg-red-900/20 border border-red-900/50 active:bg-red-900/40 transition">
                <span class="font-semibold text-xs text-red-300">Di chuyển 100% hỗn loạn</span>
                <input type="checkbox" id="chaosCheck" class="w-4 h-4 accent-red-500">
            </label>
        </div>

        <!-- Nút Đóng -->
        <button onclick="closeAllPanels()" class="mt-2 w-full py-2.5 rounded-xl bg-slate-700 text-white font-bold border border-slate-600 active:bg-slate-600 transition">
            Đóng Cài Đặt
        </button>
    </div>

    <!-- 2. Bảng Công Cụ Bút Vẽ (Tools) - Thu gọn -->
    <div id="toolsPanel" class="absolute bottom-0 left-0 w-full glass-solid rounded-t-3xl p-4 z-50 hidden flex-col gap-3 transform translate-y-full pb-6">
        <div class="w-10 h-1 bg-slate-600 rounded-full mx-auto mb-1"></div>
        <div class="relative w-full flex justify-center items-center mb-1">
            <h2 class="text-lg font-bold text-white">Công Cụ Sáng Tạo</h2>
            <button onclick="closeAllPanels()" class="absolute right-0 w-8 h-8 rounded-full bg-slate-800 border border-slate-600 flex items-center justify-center text-xs font-bold text-gray-300 hover:text-white active:scale-90 transition">✕</button>
        </div>
        
        <div class="grid grid-cols-3 gap-2">
            <button onclick="setBrush(0)" id="brush0" class="flex flex-col items-center gap-1 p-2 rounded-xl border-2 border-teal-500 bg-teal-500/20">
                <span class="text-xl">👆</span>
                <span class="text-[10px] font-bold">Đơn lẻ</span>
            </button>
            <button onclick="setBrush(1)" id="brush1" class="flex flex-col items-center gap-1 p-2 rounded-xl border-2 border-transparent bg-slate-800 active:bg-slate-700 transition">
                <span class="text-xl">💣</span>
                <span class="text-[10px] font-bold">Bom (50)</span>
            </button>
            <button onclick="setBrush(2)" id="brush2" class="flex flex-col items-center gap-1 p-2 rounded-xl border-2 border-transparent bg-slate-800 active:bg-slate-700 transition">
                <span class="text-xl">⭕</span>
                <span class="text-[10px] font-bold">Vòng tròn</span>
            </button>
        </div>

        <label class="flex items-center justify-between p-3 mt-1 rounded-xl bg-yellow-900/20 border border-yellow-700/50 active:bg-yellow-900/40 transition">
            <span class="font-bold text-sm text-yellow-400">✨ Bật vệt sáng đuôi</span>
            <input type="checkbox" id="trailCheck" class="w-4 h-4 accent-yellow-500">
        </label>

        <!-- Nút Đóng -->
        <button onclick="closeAllPanels()" class="mt-2 w-full py-2.5 rounded-xl bg-slate-700 text-white font-bold border border-slate-600 active:bg-slate-600 transition">
            Đóng Công Cụ
        </button>
    </div>

    <!-- Script Logic Game -->
    <script>
        // --- QUẢN LÝ UI STATE ---
        const mainMenu = document.getElementById('mainMenu');
        const gameHUD = document.getElementById('gameHUD');
        const overlay = document.getElementById('overlay');
        const settingsPanel = document.getElementById('settingsPanel');
        const toolsPanel = document.getElementById('toolsPanel');
        const canvas = document.getElementById('worldCanvas');
        let gameState = 'menu'; // 'menu' | 'playing'

        function startGame() {
            gameState = 'playing';
            
            // UI Animations
            mainMenu.classList.replace('fade-enter', 'fade-exit');
            setTimeout(() => {
                mainMenu.classList.add('hidden');
                mainMenu.classList.replace('fade-exit', 'fade-enter');
            }, 300);

            gameHUD.classList.remove('hidden');
            canvas.classList.replace('canvas-blur', 'canvas-clear');
            
            // Bắt đầu logic nếu đang dừng
            if(!isPlaying) togglePause();
            if(creatures.length === 0) initInitial();
        }

        function exitToMenu() {
            gameState = 'menu';
            if(isPlaying) togglePause(); // Dừng logic khi ra menu
            
            gameHUD.classList.add('hidden');
            mainMenu.classList.remove('hidden');
            canvas.classList.replace('canvas-clear', 'canvas-blur');
        }

        function openSetup() {
            openSettings(); // Mượn luôn bảng setting in-game cho nhanh gọn
        }

        // --- QUẢN LÝ BOTTOM SHEETS ---
        function openPanel(panel) {
            overlay.classList.remove('hidden');
            setTimeout(() => overlay.style.opacity = '1', 10);
            
            panel.classList.remove('hidden');
            panel.classList.remove('slide-down');
            panel.classList.add('slide-up');
        }

        function closeAllPanels() {
            overlay.style.opacity = '0';
            setTimeout(() => overlay.classList.add('hidden'), 300);

            [settingsPanel, toolsPanel].forEach(panel => {
                if(!panel.classList.contains('hidden')) {
                    panel.classList.replace('slide-up', 'slide-down');
                    setTimeout(() => panel.classList.add('hidden'), 300);
                }
            });
        }

        function openSettings() { closeAllPanels(); openPanel(settingsPanel); }
        function openTools() { closeAllPanels(); openPanel(toolsPanel); }

        function setBrush(type) {
            brushMode = type;
            document.getElementById('brushIndicator').innerText = type === 0 ? '1' : (type === 1 ? 'B' : 'O');
            // Cập nhật UI nút chọn
            for(let i=0; i<=2; i++) {
                const btn = document.getElementById('brush' + i);
                if(i === type) {
                    btn.classList.add('border-teal-500', 'bg-teal-500/20');
                    btn.classList.remove('border-transparent', 'bg-slate-800');
                } else {
                    btn.classList.remove('border-teal-500', 'bg-teal-500/20');
                    btn.classList.add('border-transparent', 'bg-slate-800');
                }
            }
            closeAllPanels();
        }

        // --- LOGIC MÔ PHỎNG CORE ---
        const ctx = canvas.getContext('2d');
        
        const TILE_SIZE = 10; 
        let LOGIC_TICK_RATE = 150; 
        let colonyDeathLimit = 30; 
        let colonyDistance = 15; 
        let flockTendency = 0.4; 
        let isChaosMode = false; 
        
        let isTrailMode = false;
        let brushMode = 0; 
        let isFastForward = false; 
        
        let cosmicWindX = 0;
        let cosmicWindY = 0;

        let creatures = [];
        let particles = [];
        let activeColonyCount = 0;
        
        // Camera & Viewport
        let cameraX = 0; 
        let cameraY = 0;
        let zoom = 1;
        let isPanning = false;
        let lastPanX = 0;
        let lastPanY = 0;

        let isPlaying = false; // Bắt đầu ở chế độ Pause (Menu)
        let isDragging = false;
        let autoSpawnEnabled = true;
        let lastLogicTime = performance.now();

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function mutateColor(baseColor) {
            let match = baseColor.match(/hsl\((\d+)/);
            if (match) {
                let hue = parseInt(match[1]);
                hue = (hue + Math.floor(Math.random() * 120 - 60) + 360) % 360;
                return `hsl(${hue}, 100%, 70%)`;
            }
            return `hsl(${Math.random() * 360}, 100%, 70%)`;
        }

        class Creature {
            constructor(x, y, color = null) {
                this.x = x; this.y = y;
                this.lastX = x; this.lastY = y;
                this.rotation = Math.floor(Math.random() * 4); 
                this.color = color || `hsl(${Math.random() * 360}, 100%, 70%)`;
                this.cooldown = Math.floor(Math.random() * 20); 
                this.colonyId = null; 
                this.hasColony = false;
                this.stepDelay = Math.floor(Math.random() * 3) + 1; 
                this.stepTimer = 0;
                this.isHyper = Math.random() < 0.15; 
                this.shapeType = Math.random() < 0.5 ? 'L' : 'J'; 
            }

            getCells(cx, cy, rot) {
                let cells = [{x: cx, y: cy}]; 
                if (this.shapeType === 'L') {
                    if (rot === 0) cells.push({x: cx, y: cy - 1}, {x: cx, y: cy + 1}, {x: cx + 1, y: cy + 1});
                    else if (rot === 1) cells.push({x: cx + 1, y: cy}, {x: cx - 1, y: cy}, {x: cx - 1, y: cy + 1});
                    else if (rot === 2) cells.push({x: cx, y: cy + 1}, {x: cx, y: cy - 1}, {x: cx - 1, y: cy - 1});
                    else if (rot === 3) cells.push({x: cx - 1, y: cy}, {x: cx + 1, y: cy}, {x: cx + 1, y: cy - 1});
                } else { 
                    if (rot === 0) cells.push({x: cx, y: cy - 1}, {x: cx, y: cy + 1}, {x: cx - 1, y: cy + 1});
                    else if (rot === 1) cells.push({x: cx + 1, y: cy}, {x: cx - 1, y: cy}, {x: cx - 1, y: cy - 1});
                    else if (rot === 2) cells.push({x: cx, y: cy + 1}, {x: cx, y: cy - 1}, {x: cx + 1, y: cy - 1});
                    else if (rot === 3) cells.push({x: cx - 1, y: cy}, {x: cx + 1, y: cy}, {x: cx + 1, y: cy + 1});
                }
                return cells;
            }

            getOccupiedCells() { return this.getCells(this.x, this.y, this.rotation); }

            move(occupiedMap) {
                if (this.cooldown > 0) this.cooldown--;
                
                this.stepTimer++;
                if (this.stepTimer < this.stepDelay) {
                    this.lastX = this.x; this.lastY = this.y;
                    return;
                }
                this.stepTimer = 0;
                this.lastX = this.x; this.lastY = this.y;

                let dx = Math.floor(Math.random() * 3) - 1; 
                let dy = Math.floor(Math.random() * 3) - 1; 

                if (!isChaosMode && this.hasColony && Math.random() < flockTendency) {
                    let distToCenter = Math.max(Math.abs(this.colonyCenterX - this.x), Math.abs(this.colonyCenterY - this.y));
                    if (distToCenter > 2) {
                        if (Math.random() < 0.7) dx = this.colonyCenterX > this.x ? 1 : (this.colonyCenterX < this.x ? -1 : 0);
                        if (Math.random() < 0.7) dy = this.colonyCenterY > this.y ? 1 : (this.colonyCenterY < this.y ? -1 : 0);
                    } else if (distToCenter < 1.5) {
                        if (Math.random() < 0.7) dx = this.colonyCenterX > this.x ? -1 : (this.colonyCenterX < this.x ? 1 : dx);
                        if (Math.random() < 0.7) dy = this.colonyCenterY > this.y ? -1 : (this.colonyCenterY < this.y ? 1 : dy);
                    }
                }

                if (this.isHyper) { dx *= 2; dy *= 2; }
                if (Math.random() < 0.4) { dx += cosmicWindX; dy += cosmicWindY; }

                let nx = this.x + dx;
                let ny = this.y + dy;
                let nrot = this.rotation;
                
                if (isChaosMode || Math.random() < 0.5) nrot = Math.floor(Math.random() * 4);

                let newCells = this.getCells(nx, ny, nrot);
                let collision = false;

                for (let cell of newCells) {
                    let occupant = occupiedMap.get(`${cell.x},${cell.y}`);
                    if (occupant && occupant !== this) { collision = true; break; }
                }

                if (!collision) {
                    this.getOccupiedCells().forEach(cell => occupiedMap.delete(`${cell.x},${cell.y}`));
                    this.x = nx; this.y = ny; this.rotation = nrot;
                    this.getOccupiedCells().forEach(cell => occupiedMap.set(`${cell.x},${cell.y}`, this));
                }
            }

            draw(ctx, progress) {
                let renderX = this.lastX + (this.x - this.lastX) * progress;
                let renderY = this.lastY + (this.y - this.lastY) * progress;

                ctx.fillStyle = this.color;
                ctx.beginPath();
                
                const off = 1; 
                const size = TILE_SIZE - 2;

                let renderCells = this.getCells(renderX, renderY, this.rotation);
                renderCells.forEach(cell => {
                    ctx.rect(cell.x * TILE_SIZE + off, cell.y * TILE_SIZE + off, size, size);
                });
                ctx.fill(); 
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x * TILE_SIZE + TILE_SIZE / 2;
                this.y = y * TILE_SIZE + TILE_SIZE / 2;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1.0;
                this.color = color;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= 0.04; }
            draw(ctx) {
                if (this.life <= 0) return;
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, TILE_SIZE / 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        function updateLogic() {
            if (Math.random() < 0.05) {
                cosmicWindX = Math.floor(Math.random() * 3) - 1;
                cosmicWindY = Math.floor(Math.random() * 3) - 1;
                let windMap = {"0,0": "Tĩnh lặng 🎐", "1,0": "Đông ➡️", "-1,0": "Tây ⬅️", "0,1": "Nam ⬇️", "0,-1": "Bắc ⬆️", "1,1": "Đông Nam ↘️", "-1,1": "Tây Nam ↙️", "1,-1": "Đông Bắc ↗️", "-1,-1": "Tây Bắc ↖️"};
                document.getElementById('windDisplay').innerText = windMap[`${cosmicWindX},${cosmicWindY}`];
            }

            let occupiedMap = new Map();
            creatures.forEach(c => {
                c.getOccupiedCells().forEach(cell => occupiedMap.set(`${cell.x},${cell.y}`, c));
            });

            let toRemove = new Set();
            let newBorns = [];
            activeColonyCount = 0;

            creatures.forEach(c => { if (!toRemove.has(c)) c.move(occupiedMap); });

            let spatialGrid = new Map();
            let hashSize = colonyDistance; 
            
            creatures.forEach((c, index) => {
                if (toRemove.has(c)) return;
                let gx = Math.floor(c.x / hashSize);
                let gy = Math.floor(c.y / hashSize);
                let key = `${gx},${gy}`;
                if (!spatialGrid.has(key)) spatialGrid.set(key, []);
                spatialGrid.get(key).push(index);
            });

            let visited = new Set();

            for (let i = 0; i < creatures.length; i++) {
                if (visited.has(i) || toRemove.has(creatures[i])) continue;

                let component = [];
                let queue = [i];
                let currentColonyId = i; 
                visited.add(i);

                let head = 0;
                while (head < queue.length) {
                    let curr = queue[head++];
                    let currCreature = creatures[curr];
                    component.push(curr);

                    let cgx = Math.floor(currCreature.x / hashSize);
                    let cgy = Math.floor(currCreature.y / hashSize);

                    for (let ox = -1; ox <= 1; ox++) {
                        for (let oy = -1; oy <= 1; oy++) {
                            let neighbors = spatialGrid.get(`${cgx + ox},${cgy + oy}`);
                            if (neighbors) {
                                for (let j of neighbors) {
                                    if (visited.has(j)) continue;
                                    let dx = Math.abs(currCreature.x - creatures[j].x);
                                    let dy = Math.abs(currCreature.y - creatures[j].y);
                                    if (dx <= colonyDistance && dy <= colonyDistance) {
                                        visited.add(j); queue.push(j);
                                    }
                                }
                            }
                        }
                    }
                }

                let sumX = 0, sumY = 0;
                component.forEach(idx => { sumX += creatures[idx].x; sumY += creatures[idx].y; });
                
                let centerX = (sumX / component.length) + (Math.random() * 10 - 5);
                let centerY = (sumY / component.length) + (Math.random() * 10 - 5);
                let hasColony = component.length > 1;

                if (hasColony) activeColonyCount++;

                component.forEach(idx => {
                    creatures[idx].colonyCenterX = centerX;
                    creatures[idx].colonyCenterY = centerY;
                    creatures[idx].hasColony = hasColony;
                    creatures[idx].colonyId = currentColonyId;
                });

                if (component.length > colonyDeathLimit) {
                    let excess = component.length - colonyDeathLimit;
                    let shuffled = [...component].sort(() => 0.5 - Math.random());
                    let deathRow = shuffled.slice(0, excess);

                    deathRow.forEach(idx => {
                        let c = creatures[idx];
                        toRemove.add(c);
                        c.getOccupiedCells().forEach(cell => occupiedMap.delete(`${cell.x},${cell.y}`));
                        for (let p = 0; p < 8; p++) particles.push(new Particle(c.x, c.y, c.color));
                    });
                }

                for (let a = 0; a < component.length; a++) {
                    for (let b = a + 1; b < component.length; b++) {
                        let c1 = creatures[component[a]]; let c2 = creatures[component[b]];
                        if (toRemove.has(c1) || toRemove.has(c2) || c1.cooldown > 0 || c2.cooldown > 0) continue; 

                        let dx = Math.abs(c1.x - c2.x);
                        let dy = Math.abs(c1.y - c2.y);
                        
                        if (dx <= 2 && dy <= 2) {
                            let nx, ny;
                            if (Math.random() < 0.05) {
                                nx = c1.x + Math.floor(Math.random() * 61) - 30; 
                                ny = c1.y + Math.floor(Math.random() * 61) - 30;
                            } else {
                                nx = c1.x + Math.floor(Math.random() * 5) - 2;
                                ny = c1.y + Math.floor(Math.random() * 5) - 2;
                            }
                            
                            let newBorn = new Creature(nx, ny, mutateColor(c1.color));
                            let overlap = false;
                            for (let cell of newBorn.getOccupiedCells()) {
                                if (occupiedMap.has(`${cell.x},${cell.y}`)) { overlap = true; break; }
                            }

                            if (!overlap) {
                                newBorn.cooldown = Math.floor(Math.random() * 20) + 10; 
                                newBorns.push(newBorn);
                                newBorn.getOccupiedCells().forEach(cell => occupiedMap.set(`${cell.x},${cell.y}`, newBorn));
                                c1.cooldown = Math.floor(Math.random() * 15) + 5;
                                c2.cooldown = Math.floor(Math.random() * 15) + 5;
                            }
                        }
                    }
                }
            }

            creatures = creatures.filter(c => !toRemove.has(c));
            creatures.push(...newBorns);
            
            if (autoSpawnEnabled && Math.random() < 0.8) {
                let camWorldX = Math.floor(cameraX / TILE_SIZE);
                let camWorldY = Math.floor(cameraY / TILE_SIZE);
                let viewWidth = Math.floor((canvas.width / zoom) / TILE_SIZE);
                let viewHeight = Math.floor((canvas.height / zoom) / TILE_SIZE);
                
                let rx = camWorldX + Math.floor((Math.random() - 0.5) * (viewWidth * 5));
                let ry = camWorldY + Math.floor((Math.random() - 0.5) * (viewHeight * 5));
                
                let newSpawn = new Creature(rx, ry);
                let overlap = false;
                for (let cell of newSpawn.getOccupiedCells()) {
                    if (occupiedMap.has(`${cell.x},${cell.y}`)) { overlap = true; break; }
                }
                if (!overlap) creatures.push(newSpawn);
            }
            
            if(gameState === 'playing') {
                document.getElementById('popCount').innerText = creatures.length;
                document.getElementById('colonyCount').innerText = activeColonyCount;
            }
        }

        function animate(time) {
            requestAnimationFrame(animate);

            // Chỉ chạy logic khi đang chơi (không ở menu) và không bị pause
            if (isPlaying && gameState === 'playing') {
                if (time - lastLogicTime > LOGIC_TICK_RATE) {
                    updateLogic();
                    lastLogicTime = time;
                }
            } else {
                lastLogicTime = time;
            }

            if (isTrailMode && !isPanning && gameState === 'playing') {
                ctx.fillStyle = 'rgba(15, 23, 42, 0.08)'; 
            } else {
                ctx.fillStyle = '#0f172a';
            }
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(zoom, zoom);
            ctx.translate(-cameraX, -cameraY);

            if (!isTrailMode) {
                let gridStep = TILE_SIZE;
                if (zoom < 0.4) gridStep = TILE_SIZE * 5; 
                if (zoom < 0.1) gridStep = TILE_SIZE * 20; 
                
                let gridAlpha = Math.max(0.01, 0.03 * zoom);
                ctx.strokeStyle = `rgba(255, 255, 255, ${gridAlpha})`;
                ctx.lineWidth = 1 / zoom; 
                
                let startX = cameraX - (canvas.width / 2) / zoom;
                let endX = cameraX + (canvas.width / 2) / zoom;
                let startY = cameraY - (canvas.height / 2) / zoom;
                let endY = cameraY + (canvas.height / 2) / zoom;

                let firstLineX = Math.floor(startX / gridStep) * gridStep;
                let firstLineY = Math.floor(startY / gridStep) * gridStep;

                ctx.beginPath();
                for (let x = firstLineX; x <= endX; x += gridStep) { ctx.moveTo(x, startY); ctx.lineTo(x, endY); }
                for (let y = firstLineY; y <= endY; y += gridStep) { ctx.moveTo(startX, y); ctx.lineTo(endX, y); }
                ctx.stroke();
            }

            let progress = (isPlaying && gameState === 'playing') ? Math.max(0, Math.min((time - lastLogicTime) / LOGIC_TICK_RATE, 1.0)) : 1.0;
            creatures.forEach(c => c.draw(ctx, progress));

            particles.forEach(p => { p.update(); p.draw(ctx); });
            ctx.restore(); 

            particles = particles.filter(p => p.life > 0);
        }

        // --- ĐIỀU KHIỂN & SỰ KIỆN TƯƠNG TÁC (TỐI ƯU MOBILE) ---
        function screenToWorld(sx, sy) {
            let wx = (sx - canvas.width / 2) / zoom + cameraX;
            let wy = (sy - canvas.height / 2) / zoom + cameraY;
            return { x: Math.floor(wx / TILE_SIZE), y: Math.floor(wy / TILE_SIZE) };
        }

        function spawnAtMouse(x, y) {
            if(gameState !== 'playing') return;
            let worldPos = screenToWorld(x, y);
            
            if (brushMode === 0) {
                creatures.push(new Creature(worldPos.x, worldPos.y));
            } else if (brushMode === 1) {
                for (let i = 0; i < 50; i++) {
                    let rx = worldPos.x + Math.floor((Math.random() - 0.5) * 6);
                    let ry = worldPos.y + Math.floor((Math.random() - 0.5) * 6);
                    creatures.push(new Creature(rx, ry));
                }
            } else if (brushMode === 2) {
                let radius = 12;
                for (let i = 0; i < 24; i++) {
                    let angle = (i / 24) * Math.PI * 2;
                    let rx = worldPos.x + Math.floor(Math.cos(angle) * radius);
                    let ry = worldPos.y + Math.floor(Math.sin(angle) * radius);
                    creatures.push(new Creature(rx, ry));
                }
            }
        }

        // Xử lý chạm/kéo trên di động (Hỗ trợ đa điểm để zoom/pan)
        let initialPinchDistance = null;
        let initialZoom = 1;

        canvas.addEventListener('touchstart', (e) => {
            if(gameState !== 'playing') return;
            if (e.touches.length === 1) {
                isDragging = true;
                lastPanX = e.touches[0].clientX;
                lastPanY = e.touches[0].clientY;
                spawnAtMouse(e.touches[0].clientX, e.touches[0].clientY);
            } else if (e.touches.length === 2) {
                isDragging = false;
                isPanning = false;
                initialPinchDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                initialZoom = zoom;
            }
        }, {passive: false});

        canvas.addEventListener('touchmove', (e) => {
            if(gameState !== 'playing') return;
            e.preventDefault(); // Chống cuộn
            if (e.touches.length === 1 && isDragging) {
                // Di chuyển ngón tay -> Pan camera
                let dx = e.touches[0].clientX - lastPanX;
                let dy = e.touches[0].clientY - lastPanY;
                cameraX -= dx / zoom;
                cameraY -= dy / zoom;
                lastPanX = e.touches[0].clientX;
                lastPanY = e.touches[0].clientY;
                
                // Đồng thời rải sinh vật nếu di chuyển chậm
                let spawnChance = brushMode === 0 ? 0.2 : 0.05; 
                if (Math.random() < spawnChance) spawnAtMouse(e.touches[0].clientX, e.touches[0].clientY);
            } else if (e.touches.length === 2) {
                // Pinch to Zoom
                let currentDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                zoom = initialZoom * (currentDistance / initialPinchDistance);
                zoom = Math.max(0.05, Math.min(zoom, 5));
            }
        }, {passive: false});

        canvas.addEventListener('touchend', () => { isDragging = false; initialPinchDistance = null; });

        // Tương thích cho Chuột (PC)
        canvas.addEventListener('pointerdown', (e) => {
            if(gameState !== 'playing' || e.pointerType === 'touch') return;
            if (e.button === 2 || e.button === 1) { 
                isPanning = true; lastPanX = e.clientX; lastPanY = e.clientY;
            } else {
                isDragging = true; spawnAtMouse(e.clientX, e.clientY);
            }
        });
        canvas.addEventListener('pointerup', (e) => { if(e.pointerType === 'touch') return; isPanning = false; isDragging = false; });
        canvas.addEventListener('pointermove', (e) => {
            if(gameState !== 'playing' || e.pointerType === 'touch') return;
            if (isPanning) {
                cameraX -= (e.clientX - lastPanX) / zoom;
                cameraY -= (e.clientY - lastPanY) / zoom;
                lastPanX = e.clientX; lastPanY = e.clientY;
            } else if (isDragging) {
                let spawnChance = brushMode === 0 ? 0.2 : 0.05; 
                if (Math.random() < spawnChance) spawnAtMouse(e.clientX, e.clientY);
            }
        });
        canvas.addEventListener('wheel', (e) => {
            if(gameState !== 'playing') return;
            let zoomFactor = 1.1;
            let wx = (e.clientX - canvas.width / 2) / zoom + cameraX;
            let wy = (e.clientY - canvas.height / 2) / zoom + cameraY;

            if (e.deltaY > 0) zoom /= zoomFactor; else zoom *= zoomFactor;
            zoom = Math.max(0.01, Math.min(zoom, 10)); 

            let nx = (e.clientX - canvas.width / 2) / zoom + cameraX;
            let ny = (e.clientY - canvas.height / 2) / zoom + cameraY;
            cameraX -= (nx - wx); cameraY -= (ny - wy);
        }, { passive: true });
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        // --- CÁC HÀM NÚT BẤM (HUD) ---
        function togglePause() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('btnToggle');
            btn.innerHTML = isPlaying ? '<span class="text-sm">⏸</span>' : '<span class="text-sm">▶️</span>';
            btn.className = isPlaying 
                ? 'w-10 h-10 rounded-full bg-teal-600/80 flex items-center justify-center active:scale-90 transition border border-teal-500 shadow-[0_0_10px_rgba(20,184,166,0.5)]'
                : 'w-10 h-10 rounded-full bg-amber-600/80 flex items-center justify-center active:scale-90 transition border border-amber-500 shadow-[0_0_10px_rgba(217,119,6,0.5)] pl-1';
        }

        function spawnRandomBatch(e) {
            let camWorldX = Math.floor(cameraX / TILE_SIZE);
            let camWorldY = Math.floor(cameraY / TILE_SIZE);
            let viewWidth = Math.floor((canvas.width / zoom) / TILE_SIZE);
            let viewHeight = Math.floor((canvas.height / zoom) / TILE_SIZE);

            for (let i = 0; i < 30; i++) {
                let rx = camWorldX + Math.floor((Math.random() - 0.5) * viewWidth);
                let ry = camWorldY + Math.floor((Math.random() - 0.5) * viewHeight);
                creatures.push(new Creature(rx, ry));
            }
            document.getElementById('popCount').innerText = creatures.length;
            
            // Animation nhẹ cho nút
            if (e && e.currentTarget) {
                const btn = e.currentTarget;
                btn.style.transform = 'scale(0.8)';
                setTimeout(() => btn.style.transform = '', 150);
            }
        }

        function clearWorld() {
            creatures = []; particles = []; activeColonyCount = 0;
            document.getElementById('popCount').innerText = 0;
            document.getElementById('colonyCount').innerText = 0;
        }

        // --- RÀNG BUỘC SỰ KIỆN SETTING ---
        document.getElementById('speedSlider').addEventListener('input', (e) => { LOGIC_TICK_RATE = 510 - (parseInt(e.target.value) * 5); });
        document.getElementById('limitSlider').addEventListener('input', (e) => {
            colonyDeathLimit = parseInt(e.target.value);
            document.getElementById('limitDisplay').innerText = colonyDeathLimit;
        });
        document.getElementById('distanceSlider').addEventListener('input', (e) => {
            colonyDistance = parseInt(e.target.value);
            document.getElementById('distanceDisplay').innerText = colonyDistance;
        });
        document.getElementById('flockSlider').addEventListener('input', (e) => {
            let val = parseInt(e.target.value);
            flockTendency = val / 100;
            document.getElementById('flockDisplay').innerText = val;
        });
        document.getElementById('autoSpawnCheck').addEventListener('change', (e) => autoSpawnEnabled = e.target.checked);
        document.getElementById('chaosCheck').addEventListener('change', (e) => {
            isChaosMode = e.target.checked;
            document.getElementById('flockSlider').parentElement.style.opacity = isChaosMode ? '0.4' : '1';
        });
        document.getElementById('trailCheck').addEventListener('change', (e) => isTrailMode = e.target.checked);
        
        document.getElementById('btnEra').addEventListener('click', () => {
            let speed = Math.floor(Math.random() * 100) + 1;
            document.getElementById('speedSlider').value = speed; LOGIC_TICK_RATE = 510 - (speed * 5);

            let limit = Math.floor(Math.random() * 195) + 5;
            document.getElementById('limitSlider').value = limit; colonyDeathLimit = limit;
            document.getElementById('limitDisplay').innerText = limit;

            let dist = Math.floor(Math.random() * 48) + 2;
            document.getElementById('distanceSlider').value = dist; colonyDistance = dist;
            document.getElementById('distanceDisplay').innerText = dist;

            let flock = Math.floor(Math.random() * 100);
            document.getElementById('flockSlider').value = flock; flockTendency = flock / 100;
            document.getElementById('flockDisplay').innerText = flock;

            isChaosMode = Math.random() > 0.8;
            document.getElementById('chaosCheck').checked = isChaosMode;
            document.getElementById('flockSlider').parentElement.style.opacity = isChaosMode ? '0.4' : '1';
        });

        // --- KHỞI TẠO BẮT ĐẦU ---
        function initInitial() {
            let occupiedInitial = new Set();
            for (let i = 0; i < 500; i++) {
                let clusterX = Math.floor((Math.random() - 0.5) * 400); 
                let clusterY = Math.floor((Math.random() - 0.5) * 400);
                let rx = clusterX + Math.floor((Math.random() - 0.5) * 20);
                let ry = clusterY + Math.floor((Math.random() - 0.5) * 20);
                let key = `${rx},${ry}`;
                if (!occupiedInitial.has(key)) {
                    creatures.push(new Creature(rx, ry));
                    occupiedInitial.add(key);
                }
            }
        }

        // Tự động chạy nền ngay cả khi ở Menu (nhưng canvas bị mờ)
        initInitial();
        isPlaying = true; // Cho phép chạy background mờ
        requestAnimationFrame(animate);

    </script>
